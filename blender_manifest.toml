schema_version = "1.0.0"
id = "EternalShade3D_Utility_Toolbox"
version = "1.22.0"
name = "Eternal Utility Toolbox ◈"
tagline = "Precision Scaling and Evaluated Truth Dimensions for Objects"
maintainer = "EternalShade3D <eternal.shadeon@gmail.com>"
type = "add-on"
blender_version_min = "4.2.0"

license = [
  "SPDX:GPL-3.0-or-later",
]

tags = ["Modeling", "Object", "System"]

description = """
A high-precision utility toolkit focused on mathematical accuracy within the Blender workflow. 
Unlike standard transform tools, this toolbox provides:
- Evaluated 'Truth' Dimensions: Real-time monitoring of object size accounting for the entire modifier stack.
- Edit Mode Precision: Direct dimension input and scaling for vertex/edge/face selections.
- Smart Origin Alignment: Mathematical snapping of origins to bounding box coordinates or geometry medians.
- Dynamic Naming & Cleanup: Systematic asset management to maintain clean, professional production scenes.
"""

[permissions]
files = "Required to save and load custom naming presets JSON to disk"

[build]
paths_exclude_pattern = [
  "__pycache__/",
  ".*",
  "*.zip",
  "*.blend",
  "*.blend1",
]